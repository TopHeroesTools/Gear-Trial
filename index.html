<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gear Trial Calculator</title>
<style>
  :root {
    --bg: #0f1220;
    --card: #171a2b;
    --muted: #9aa3b2;
    --text: #e7ecf3;
    --accent: #6ee7b7;
    --accent-2: #8ab4ff;
    --warn: #fbbf24;
    --danger: #fb7185;
    --border: #273043;
    --shadow: 0 10px 30px rgba(0, 0, 0, .35);
  }

  * { box-sizing: border-box; }
  html, body { min-height: 100%; }

  body {
    margin: 0;
    padding: 18px;
    background:
      radial-gradient(1200px 600px at 80% -20%, rgba(138,180,255,.15), transparent),
      radial-gradient(800px 400px at -10% 10%, rgba(110,231,183,.12), transparent),
      var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    line-height: 1.45;
  }

  h1 {
    margin: 0 0 6px;
    font-size: 28px;
    letter-spacing: .2px;
  }

  .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 18px;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
  }

  .row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: #0b0e1a;
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: var(--shadow);
    font: inherit;
  }

  .btn:hover { border-color: var(--accent-2); }

  .btn.warn {
    background: linear-gradient(180deg, rgba(251,191,36,.22), transparent 40%), #161309;
    border-color: rgba(251,191,36,.35);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  .calc-item {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #0b0f1d;
    padding: 14px;
    box-shadow: var(--shadow);
  }

  .calc-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: start;
    margin-bottom: 12px;
  }

  .calc-title {
    font-weight: 700;
    font-size: 16px;
  }

  .muted {
    color: var(--muted);
    font-size: 12px;
  }

  .mini-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .stat {
    background: rgba(255,255,255,.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
  }

  .stat-label {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-weight: 700;
    font-size: 15px;
    word-break: break-word;
  }

  .input-wrap {
    margin-top: 12px;
  }

  .input-label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  input[type="number"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    background: #0d1020;
    color: var(--text);
    border: 1px solid var(--border);
    outline: none;
    font: inherit;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  input[type="number"]:placeholder-shown {
    border-color: var(--danger);
    box-shadow: 0 0 0 2px rgba(251,113,133,0.28);
  }

  input[type="number"]:not(:placeholder-shown) {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(110,231,183,0.28);
  }

  input[type="number"]:focus:placeholder-shown {
    border-color: var(--danger);
    box-shadow:
      0 0 0 2px rgba(251,113,133,0.32),
      0 0 10px rgba(251,113,133,0.28);
  }

  input[type="number"]:focus:not(:placeholder-shown) {
    border-color: var(--accent);
    box-shadow:
      0 0 0 2px rgba(110,231,183,0.38),
      0 0 10px rgba(110,231,183,0.35);
  }

  .item-points {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
  }

  .item-points strong {
    font-size: 18px;
  }

  .result {
    display: grid;
    gap: 12px;
    margin-top: 16px;
  }

  .totals {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 14px;
  }

  .total-box {
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #0b0f1d;
    box-shadow: var(--shadow);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  .total-box h3 {
    margin: 0 0 6px;
    font-size: 16px;
    color: var(--muted);
  }

  .total {
    font-size: 24px;
    font-weight: 700;
  }

  .total-box.complete {
    border-color: var(--accent);
    box-shadow:
      0 0 0 2px rgba(110,231,183,0.28),
      0 0 16px rgba(110,231,183,0.22);
    background: linear-gradient(180deg, rgba(110,231,183,.10), transparent 55%), #0b0f1d;
  }

  .total-box.complete .total {
    color: var(--accent);
  }

  .foot {
    margin-top: 18px;
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 700px) {
    body {
      padding: 14px;
    }

    h1 {
      font-size: 24px;
    }

    .mini-grid {
      grid-template-columns: 1fr;
    }

    .calc-top {
      flex-direction: column;
    }

    .totals {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="row" style="gap:12px; align-items:flex-end;">
    <div>
      <h1>Gear Trial Calculator</h1>
      <div class="sub">Enter your current amount for each item to see your total points and how many remain until max reward.</div>
    </div>
  </header>

  <div class="row" style="margin-top:8px; gap:8px;">
    <button class="btn warn" id="resetBtn">Reset Inventory</button>
    <button class="btn" id="copyLinkBtn">Copy Results Link</button>
  </div>

  <section id="itemsGrid" class="grid" aria-live="polite"></section>

  <section class="result">
    <div class="totals">
      <div class="total-box">
        <h3>Total Points</h3>
        <div class="total" id="currentTotal">0</div>
      </div>

      <div class="total-box" id="remainingBox">
        <h3>Remaining Points</h3>
        <div class="total" id="pointsNeeded">1,000,000</div>
      </div>
    </div>
  </section>

  <footer class="foot">Mobile-friendly version styled to match your original calculator layout.</footer>
</div>

<script>
  const MAX_REWARD_POINTS = 1000000;

  const rows = [
    { action: "Gear Enhance Ruins", amountNeeded: 5, pointsPerAction: 1 },
    { action: "Solar Gold Ingots", amountNeeded: 1, pointsPerAction: 50 },
    { action: "Mythic Promotion Stone", amountNeeded: 1, pointsPerAction: 20000 },
    { action: "Legendary Promotion Stone", amountNeeded: 2, pointsPerAction: 5000 },
    { action: "Titan Mark", amountNeeded: 2, pointsPerAction: 6000 }
  ];

  const slugify = s => s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");

  function formatNumber(n) {
    return Number(n || 0).toLocaleString(undefined, { maximumFractionDigits: 2 });
  }

  function calcPoints(row, inventory) {
    return (Number(inventory || 0) / row.amountNeeded) * row.pointsPerAction;
  }

  function buildItemsGrid() {
    const grid = document.getElementById("itemsGrid");
    grid.innerHTML = "";

    rows.forEach(row => {
      const key = slugify(row.action);

      const card = document.createElement("div");
      card.className = "calc-item";
      card.innerHTML = `
        <div class="calc-top">
          <div>
            <div class="calc-title">${row.action}</div>
            <div class="muted">Enter how many you currently have</div>
          </div>
        </div>

        <div class="mini-grid">
          <div class="stat">
            <div class="stat-label">Amount Needed</div>
            <div class="stat-value">${formatNumber(row.amountNeeded)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Points Rewarded</div>
            <div class="stat-value">${formatNumber(row.pointsPerAction)}</div>
          </div>
        </div>

        <div class="input-wrap">
          <label class="input-label" for="${key}">My Resources</label>
          <input type="number" id="${key}" data-key="${key}" min="0" step="any" inputmode="decimal" placeholder="0" />
        </div>

        <div class="item-points">
          <span class="muted">My Points</span>
          <strong id="${key}-points">0</strong>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function getInventory(key) {
    const input = document.querySelector(`input[data-key="${key}"]`);
    const val = Number(input?.value || 0);
    return Number.isFinite(val) && val >= 0 ? val : 0;
  }

  function updateTotals() {
    let total = 0;

    rows.forEach(row => {
      const key = slugify(row.action);
      const inventory = getInventory(key);
      const myPoints = calcPoints(row, inventory);
      total += myPoints;

      const itemPoints = document.getElementById(`${key}-points`);
      if (itemPoints) itemPoints.textContent = formatNumber(myPoints);
    });

    const remaining = Math.max(0, MAX_REWARD_POINTS - total);

    document.getElementById("currentTotal").textContent = formatNumber(total);
    document.getElementById("pointsNeeded").textContent = formatNumber(remaining);

    const remainingBox = document.getElementById("remainingBox");
    if (remaining === 0) {
      remainingBox.classList.add("complete");
    } else {
      remainingBox.classList.remove("complete");
    }

    updateQueryString(false);
  }

  function resetInventory() {
    document.querySelectorAll('#itemsGrid input[type="number"]').forEach(input => {
      input.value = "";
    });
    updateTotals();
  }

  function updateQueryString(push = false) {
    const params = new URLSearchParams();
    rows.forEach(row => {
      const key = slugify(row.action);
      const input = document.querySelector(`input[data-key="${key}"]`);
      const raw = input?.value?.trim() || "";
      if (raw !== "") params.set(key, raw);
    });

    const url = params.toString() ? `${location.pathname}?${params.toString()}` : location.pathname;
    push ? history.pushState({}, "", url) : history.replaceState({}, "", url);
  }

  function applyQueryString() {
    const params = new URLSearchParams(location.search);
    rows.forEach(row => {
      const key = slugify(row.action);
      const val = params.get(key);
      if (val === null) return;
      const input = document.querySelector(`input[data-key="${key}"]`);
      if (input) input.value = val;
    });
  }

  document.getElementById("copyLinkBtn").addEventListener("click", () => {
    navigator.clipboard.writeText(location.href)
      .then(() => alert("Link copied to clipboard!"))
      .catch(() => alert("Unable to copy the link in this browser."));
  });

  document.getElementById("resetBtn").addEventListener("click", resetInventory);

  buildItemsGrid();
  applyQueryString();

  document.querySelectorAll('#itemsGrid input[type="number"]').forEach(input => {
    input.addEventListener("input", updateTotals);
  });

  updateTotals();
</script>
</body>
</html>
